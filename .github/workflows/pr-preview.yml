name: PR Preview
# Publishes every PR to gh-pages under /pr-<number>/ so Ripon can playtest the
# PR's behavior on a deployed environment before merging. On PR close, removes
# that PR's preview directory.
#
# Word-Quest ships index.html + src/ + assets/ + manifest.webmanifest as raw
# static files (no Vite, no bundler). The "build" step here is a no-op copy
# of those paths into a publish/ directory, which is then deployed under the
# /pr-<N>/ subpath via peaceiris/actions-gh-pages.
#
# Issue #39. Deployed by the Stratos Games Factory — do not hand-edit.

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  # Shared group across ALL PRs to serialize gh-pages pushes.
  # Without this, parallel PR pushes race on git push to gh-pages and some fail
  # with "rejected — fetch first". cancel-in-progress: false queues runs instead.
  group: gh-pages-deploy
  cancel-in-progress: false

jobs:
  deploy:
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Stage raw static files for preview
        # Word-Quest has no bundler. Stage the raw shipped paths into publish/
        # so peaceiris/actions-gh-pages can deploy them under /pr-<N>/.
        # Manifest + classicLevels.json + assets all resolve relative to
        # publish/ root, which maps to /Word-Quest-v1.0/pr-<N>/ on gh-pages.
        run: |
          set -e
          mkdir -p publish
          cp index.html publish/
          cp manifest.webmanifest publish/ 2>/dev/null || true
          cp -r src publish/
          cp -r assets publish/ 2>/dev/null || true

      - name: Publish preview to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./publish
          destination_dir: pr-${{ github.event.pull_request.number }}
          keep_files: true
          commit_message: "preview: PR #${{ github.event.pull_request.number }} (${{ github.event.pull_request.head.sha }})"
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'

      - name: Comment with preview URL (idempotent)
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request.number;
            const url = `https://${context.repo.owner}.github.io/${context.repo.repo}/pr-${pr}/`;
            const marker = '<!-- stratos-preview -->';
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr,
              per_page: 100
            });
            const existing = comments.find(c => c.body && c.body.includes(marker));
            const body = `${marker}\n🔍 **PR preview ready:** ${url}\n\nThis preview rebuilds on every push to the PR branch.\n\n_Last updated: ${new Date().toISOString()}_`;
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr,
                body
              });
            }

  cleanup:
    if: github.event.action == 'closed'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout gh-pages
        id: checkout
        continue-on-error: true
        uses: actions/checkout@v4
        with:
          ref: gh-pages

      - name: Remove preview directory
        if: steps.checkout.outcome == 'success'
        run: |
          set -e
          dir="pr-${{ github.event.pull_request.number }}"
          if [ -d "$dir" ]; then
            git config user.email 'github-actions[bot]@users.noreply.github.com'
            git config user.name 'github-actions[bot]'
            rm -rf "$dir"
            git add -A
            if ! git diff --cached --quiet; then
              git commit -m "cleanup: remove preview for PR #${{ github.event.pull_request.number }}"
              git push
            fi
          else
            echo "No preview directory $dir, nothing to clean."
          fi
