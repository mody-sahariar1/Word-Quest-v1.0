# E2E (Playwright) — runtime-fidelity gate per CLAUDE.md Step 3 rule 9.
# Issue #11. Boots `npm run dev` (python3 -m http.server 8000) via the
# webServer block in playwright.config.js, then drives the real router /
# event bus through Chromium. Required check before merging logic-touching
# PRs once branch protection is configured (factory swarm-state #112 covers
# Actions write permissions; this workflow stays green either way).

name: e2e

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']
  workflow_dispatch:

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  playwright:
    name: Playwright (chromium)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Set up Python (for `npm run dev` static server)
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install npm dependencies
        run: npm ci

      - name: Install Playwright browsers + OS deps
        run: npx playwright install --with-deps chromium

      - name: Run validate (Node smoke chain)
        run: npm run validate

      - name: Run e2e (Playwright)
        run: npm test

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
