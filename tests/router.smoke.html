<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Router smoke — Word Quest</title>
  <link rel="stylesheet" href="../src/styles/tokens.css">
  <link rel="stylesheet" href="../src/styles/router.css">
  <style>
    body { font-family: var(--font-body); padding: var(--sp-4); background: var(--bg-primary); color: #fff; }
    pre { background: var(--bg-elevated); padding: var(--sp-3); border-radius: var(--r-cell); white-space: pre-wrap; }
    /* Override min-height for the smoke harness so the result <pre> stays visible. */
    section[data-screen] { min-height: 0; }
  </style>
</head>
<body>
  <h1>Router smoke</h1>
  <pre id="out">running…</pre>

  <!-- Mount root mirrors index.html. Real screens are #5+; for the smoke
       we just verify show()/back() drive [data-active] + emit events. -->
  <div id="app">
    <section data-screen="splash">splash</section>
    <section data-screen="menu">menu</section>
    <section data-screen="game">game</section>
  </div>

  <script type="module">
    import { on, _resetForTests as resetBus } from '../src/engine/eventBus.js';
    import { router, SCREENS, _resetForTests as resetRouter } from '../src/engine/router.js';
    import { EVENTS } from '../src/engine/constants.js';

    const out = document.getElementById('out');
    const log = [];
    const events = [];
    function assert(cond, msg) {
      log.push((cond ? 'PASS ' : 'FAIL ') + msg);
      if (!cond) out.style.color = '#E84545';
    }

    resetBus();
    resetRouter();
    on(EVENTS.SCREEN_ENTER, (p) => events.push(['enter', p]));
    on(EVENTS.SCREEN_EXIT, (p) => events.push(['exit', p]));

    // 1. show('splash') — first nav, no exit, one enter.
    router.show(SCREENS.SPLASH);
    assert(router.current() === 'splash', "current() === 'splash' after show('splash')");
    assert(events.filter(([k]) => k === 'enter').length === 1, 'one screen:enter fired');
    assert(events.filter(([k]) => k === 'exit').length === 0, 'no screen:exit on first nav');

    // 2. show('menu') — emits exit('splash'→'menu') + enter('menu' from 'splash').
    router.show(SCREENS.MENU, { foo: 'bar' });
    assert(router.current() === 'menu', "current() === 'menu' after show('menu')");
    const lastEnter = events.filter(([k]) => k === 'enter').slice(-1)[0][1];
    assert(lastEnter.from === 'splash' && lastEnter.payload?.foo === 'bar', 'enter payload + from carried through');

    // 3. show('menu') again — idempotent, no extra events.
    const beforeIdem = events.length;
    router.show(SCREENS.MENU);
    assert(events.length === beforeIdem, 're-show same screen is a no-op');

    // 4. back() — single-step history returns to 'splash'.
    router.back();
    assert(router.current() === 'splash', "back() returns to 'splash'");

    // 5. back() again — toggles to the other recent ('menu').
    router.back();
    assert(router.current() === 'menu', 'back() toggles to most-recent other screen');

    out.textContent = log.join('\n');
  </script>
</body>
</html>
